spring:
  application:
    name: groovo-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: Asia/Seoul
    default-property-inclusion: non_null
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3000ms}
  cache:
    type: redis
    redis:
      time-to-live: ${CACHE_TTL:600000}
      cache-null-values: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_REGION:ap-northeast-2}
    endpoint: ${AWS_S3_ENDPOINT:}
    path-style-access-enabled: ${AWS_S3_PATH_STYLE_ACCESS_ENABLED:false}
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}
    presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:5m}

app:
  jwt:
    secret: ${JWT_SECRET:}
    ws-token-expiration: ${WS_TOKEN_EXPIRATION:30m}
  session:
    ws-url: ${SESSION_WS_URL:wss://ai.groovo.io/ws/analyze}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name:-groovo-server} thread=%thread logger=%logger{36} %msg%n%wEx"
  level:
    root: INFO
    com.groovo.server: INFO
    org.hibernate.SQL: INFO

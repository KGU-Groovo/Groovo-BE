spring:
  cache:
    type: none
  datasource:
    url: jdbc:h2:mem:groovo-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: WARN
    com.groovo.server: INFO

app:
  jwt:
    secret: test-secret-key-for-jwt-signing-0123456789
    ws-token-expiration: 30m
    access-token-expiration: 30m
  session:
    ws-url: wss://test.groovo.io/ws/analyze

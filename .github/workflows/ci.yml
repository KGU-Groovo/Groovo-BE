name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew clean build

  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: build
    runs-on: [self-hosted, linux, groovo-dev]
    timeout-minutes: 15

    env:
      DEPLOY_BRANCH: dev
      DEPLOY_DIR: ~/groovo/backend
      ENV_FILE: ~/groovo/env/backend.dev.env
      REPOSITORY: ${{ github.repository }}

    steps:
      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail

          DEPLOY_DIR="${DEPLOY_DIR/#\~/$HOME}"
          ENV_FILE="${ENV_FILE/#\~/$HOME}"
          DEPLOY_PARENT="$(dirname "$DEPLOY_DIR")"
          REPO_URL="git@github.com:$REPOSITORY.git"

          mkdir -p "$DEPLOY_PARENT"
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 -H github.com >> ~/.ssh/known_hosts

          if [ -d "$DEPLOY_DIR/.git" ]; then
            cd "$DEPLOY_DIR"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
          elif [ -e "$DEPLOY_DIR" ]; then
            echo "$DEPLOY_DIR exists but is not a git repository." >&2
            exit 1
          else
            git clone --branch "$DEPLOY_BRANCH" "$REPO_URL" "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
          fi

          if [ ! -f "$ENV_FILE" ]; then
            echo "$ENV_FILE is required." >&2
            exit 1
          fi
          ln -sfn "$ENV_FILE" "$DEPLOY_DIR/.env"

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose is not installed." >&2
            exit 1
          fi

          make

          docker image prune -f
          $COMPOSE ps
